<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./CSS/font.css">
    <link rel="stylesheet" href="./CSS/media.css">
    <link rel="stylesheet" href="./CSS/basket.css">
    <link rel="stylesheet" href="./CSS/standard.css">
    <link rel="stylesheet" href="./CSS/dialog.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Palanquin+Dark:wght@400;500;600;700&family=Palanquin:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="./assets/icon/logo-mobile-hover.png">


    <script src="./JS/db.js"></script>
    <script src="./JS/template.js"></script>
    <script src="script.js"></script>
</head>

<body onload="init()">
    <header class="site-header">
        <nav>
            <img class="nav-logo" src="./assets/icon/logo.png" alt="Logo">
            <img class="burger-menu" src="./assets/icon/burger-menu.png" alt="Burger Menu">
        </nav>
    </header>
    <main>
        <section class="hero-section">
            <div class="hero-section-content">
                <img src="./assets/icon/burger-hero.png" alt="Animated burger icon">
                <div class="hero-section-text">
                    <h1>Burger<span class="h1-black">House</span><img src="./assets/img/reviews.png" alt="Reviews"></h1>
                    <span class="slogan-font">The best of Burgers, Pizza, and Greens, all in one great place.</span>

                </div>
            </div>
        </section>
        <div class="menu-and-basket-wrapper">
            <section id="menus" class="menu-section">
            </section>
            <aside class="basket-section" id="basketSection">
                <div class="basket-container">
                    <div id="basket-content" class="basket-content">
                    </div>
                </div>
            </aside>
        </div>
        <nav class="bottom-nav">
            <button class="home-mobile"></button>
            <button class="account-mobile"></button>
            <button class="logo-mobile"></button>
            
            <button class="basket-mobile" id="basketBtn" onclick="toggleBasket()">
                <div class="mobile-counter" id="mobileCounter"></div>
            </button>
        </nav>
    </main>
    <footer class="site-footer site-footer-font">
        <span><img src="./assets/icon/copyright.png" alt="copyright icon">2025 BurgerHouse</span><a
            id="imprint">Imprint</a><a href="#" id="cookies">Cookie Preferences</a>
    </footer>
    <script src="./JS/dom-manipulation.js"></script>
</body>

</html>
